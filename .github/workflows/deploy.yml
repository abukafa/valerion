name: Deploy to Arenhost

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        env:
          # Next.js build butuh koneksi ke DB untuk pre-rendering halaman
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run build

      - name: Compress Files (Untuk mempercepat transfer)
        run: zip -r deploy.zip .next public package.json package-lock.json prisma next.config.ts

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 2222 }}
          source: "deploy.zip"
          target: "/home/${{ secrets.SERVER_USER }}/valerion.jazacademy.id"

      - name: Extract & Restart App di Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 2222 }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/valerion.jazacademy.id

            # Ekstrak file build
            unzip -o deploy.zip
            rm deploy.zip

            # Jalankan di virtual environment cPanel agar versi Node.js sesuai (v20)
            source /home/${{ secrets.SERVER_USER }}/nodevenv/valerion.jazacademy.id/20/bin/activate

            # Install module khusus production
            npm ci --production

            # Generate Prisma untuk arsitektur server
            npx prisma generate

            # Push perubahan skema
            npx prisma db push --accept-data-loss

            # Restart aplikasi Node.js cPanel
            mkdir -p tmp
            touch tmp/restart.txt
